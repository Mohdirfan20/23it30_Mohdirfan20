<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Inbox | Campus Notifications Dashboard</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">


        <header>
            <div class="brand">
                <span class="brand-logo">📩</span>
                <h1>Campus Notifications</h1>
            </div>
            <p class="subtitle">Real-time Priority Inbox and Notification Dispatcher</p>
        </header>


        <div class="stats-container">
            <div class="stat-card total">
                <span class="stat-icon">📥</span>
                <div class="stat-content">
                    <h3 id="statTotalUnread">0</h3>
                    <p>Total Unread</p>
                </div>
            </div>
            <div class="stat-card urgent">
                <span class="stat-icon">🚨</span>
                <div class="stat-content">
                    <h3 id="statUrgent">0</h3>
                    <p>Urgent</p>
                </div>
            </div>
            <div class="stat-card info">
                <span class="stat-icon">ℹ️</span>
                <div class="stat-content">
                    <h3 id="statInfo">0</h3>
                    <p>Info</p>
                </div>
            </div>
            <div class="stat-card reminder">
                <span class="stat-icon">⏰</span>
                <div class="stat-content">
                    <h3 id="statReminder">0</h3>
                    <p>Reminders</p>
                </div>
            </div>
        </div>


        <div class="controls">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search title, category, or summary...">
            </div>

            <div class="filter-wrapper">
                <select id="filterType" title="Filter by notification type">
                    <option value="all">All Categories</option>
                    <option value="Urgent">Urgent</option>
                    <option value="Info">Info</option>
                    <option value="Reminder">Reminder</option>
                </select>
            </div>

            <div class="limit-wrapper">
                <select id="limitCount" title="Number of notifications to show">
                    <option value="10">Show Top 10</option>
                    <option value="15">Show Top 15</option>
                    <option value="20">Show Top 20</option>
                    <option value="50">Show Top 50</option>
                    <option value="all">Show All</option>
                </select>
            </div>
        </div>


        <div id="notificationList" class="notification-list">

        </div>

        <div class="pagination">
            <button id="prevBtn" disabled class="btn-page">&laquo; Prev</button>
            <span id="pageInfo" class="page-info">Page 1 of 1</span>
            <button id="nextBtn" disabled class="btn-page">Next &raquo;</button>
        </div>

    </div>


    <div id="notificationModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close-btn" id="closeModal" aria-label="Close modal">&times;</button>
            <div id="modalDetails">

            </div>
        </div>
    </div>


    <script src="data/notifications.js"></script>
    <script src="utils/priority.js"></script>
    <script src="script.js"></script>



</body>


</html>
